<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul's Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="main-container">
        <div id="display">
            061925
        </div>
        <div id="operations-container">
            <div class="num-sym"  id="add-symbol">+</div>
            <div class="num-sym" id="subtract-symbol">-</div>
            <div class="num-sym" id="multiply-symbol">*</div>
            <div class="num-sym" id="divide-symbol">/</div>            
        </div>
        <div id="digits-others-container">
            <div id="digits-container">
                <div class="num-sym digits"  id="seven-button">7</div>
                <div class="num-sym digits" id="eight-button">8</div>
                <div class="num-sym digits" id="nine-button">9</div>
                <div class="num-sym digits" id="four-button">4</div>
                <div class="num-sym digits"  id="five-button">5</div>
                <div class="num-sym digits" id="six-button">6</div>
                <div class="num-sym digits" id="one-button">1</div>
                <div class="num-sym digits" id="two-button">2</div>                   
                <div class="num-sym digits" id="three-button">3</div>
                <div class="num-sym digits" id="zero-button">0</div>
                <div class="num-sym digits" id="decimal-button">.</div>
                <div class="num-sym" id="clear-button">C</div>    
            </div>
            <div id="del-equals-container">
                <div class="num-sym"  id="backspace-button">&#9003;</div>
                <div class="num-sym" id="equals-button">=</div>
            </div>
        </div>
       
    </div>

    <script src="index.js"></script>
</body>
</html>
